{% set name = "pyzxing" %}
{% set version = "1.2.2" %}
{% set runner_version = "1.2.2" %}
{% set zxing_version = "3.5.4" %}
{% set runner_filename = "pyzxing-runner-1.2.2-zxing-3.5.4.jar" %}
{% set runner_sha256 = "a132a7762297e66d92683c6c5d2ef135a05f8be382798be6e7fa39254f0b5455" %}
{% set runner_source_commit = "1792fa369a923fb133e98e62b160423a4367998d" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - path: ..
    folder: source
  - url: https://github.com/ChenjieXu/pyzxing/releases/download/v{{ runner_version }}/{{ runner_filename }}
    fn: {{ runner_filename }}
    sha256: {{ runner_sha256 }}
    folder: runner

build:
  noarch: python
  number: 0
  script:
    - {{ PYTHON }} -m pip install ./source --no-deps --no-build-isolation -vv
    - {{ PYTHON }} source/scripts/install_conda_runner.py --jar runner/{{ runner_filename }} --fixture source/src/resources/qrcode.png --prefix {{ PREFIX }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.8
    - numpy
    - joblib
    - openjdk >=17,<18

test:
  imports:
    - pyzxing
  requires:
    - pip
  commands:
    - pip check
    - java -version
    - python -c "from pathlib import Path; import os; from pyzxing import BarCodeReader; root = Path(os.environ['CONDA_PREFIX']) / 'share' / 'pyzxing'; results = BarCodeReader().decode(root / 'test-data' / 'qrcode.png'); assert any(result.get('text') or result.get('raw') for result in results), results"

about:
  home: https://github.com/ChenjieXu/pyzxing
  license: MIT
  license_family: MIT
  license_file: source/LICENSE
  summary: Python wrapper for ZXing Java library.
  description: |
    PyZXing is a Python wrapper for the ZXing (Zebra Crossing) library.
    The conda package installs the release's checksum-pinned canonical Runner
    and verifies it with a real decode during the package test phase.

extra:
  recipe-maintainers:
    - ChenjieXu
