name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [created]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=pyzxing --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build-jar:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-
    
    - name: Build ZXing JAR
      run: |
        chmod +x scripts/build_jar.sh
        ./scripts/build_jar.sh
    
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v3
      with:
        name: zxing-jar
        path: releases/*.jar

  build:
    needs: [test, build-jar]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Download JAR artifact
      uses: actions/download-artifact@v3
      with:
        name: zxing-jar
        path: releases/
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools wheel
    
    - name: Update JAR filename in code
      run: |
        source pyzxing/config.py
        VERSION=$(python3 -c "from pyzxing.config import Config; print(Config.VERSION)")
        ZXING_VERSION=$(python3 -c "from pyzxing.config import Config; print(Config.DEFAULT_ZXING_VERSION)")
        JAR_FILENAME="javase-$ZXING_VERSION-SNAPSHOT-jar-with-dependencies.jar"
        sed -i "s|preset_jar_filename = .*|preset_jar_filename = \"$JAR_FILENAME\"|g" pyzxing/reader.py
    
    - name: Build package
      run: |
        python -m build
    
    - name: Copy JAR to dist for release
      run: |
        mkdir -p dist/releases
        cp releases/*.jar dist/
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/*
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        twine upload dist/*

  publish-conda:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: publish-to-conda
      uses: maxibor/conda-package-publish-action@v1.3
      with:
        subDir: 'pyzxing'
        AnacondaToken: ${{ secrets.ANACONDA_TOKEN }}