name: publish_conda

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: publish-to-conda
        uses: maxibor/conda-package-publish-action@v1.3
        with:
          subDir: 'pyzxing'
          AnacondaToken: ${{ secrets.ANACONDA_TOKEN }}
